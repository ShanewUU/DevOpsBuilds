# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    paths-ignore:
      # ignore paths and markdown files
      - ".github/workflows/**"
      - "**/*.md"
      
      - "src/CSharp/**"
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Checkout our code
      uses: actions/checkout@v6
      
    # Make gradlew executable
    - name: Make gradlew executable
      run: chmod +x ./src/java/gradlew
      
    #Run our build using Gradle
    - name: Build with Gradle
      # normally we would use run: ./gradlew build but the gradle build is in a sub directory
      run: ./src/java/gradlew build -p ./src/java/
    
    # NOTE: The Gradle Wrapper is the default and recommended way to run Gradle (https://docs.gradle.org/current/userguide/gradle_wrapper.html).
    # If your project does not have the Gradle Wrapper configured, you can use the following configuration to run Gradle with a specified version.
    #
    # - name: Setup Gradle
    #   uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
    #   with:
    #     gradle-version: '8.9'
    #
    # - name: Build with Gradle 8.9
    #   run: gradle build

  test:
    needs: build
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      # Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x ./src/java/gradlew
        
      #Run our build using Gradle
      - name: Test with Gradle
        # run: ./gradlew test
        run: ./src/java/gradlew test -p ./src/java/
